<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hello, Onchain World</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font: 16px/1.5 system-ui, sans-serif;
    color: #f8fafc;
    background: radial-gradient(circle at 50% -10%, #1e293b 0, #0f172a 60%, #020617 100%);
  }
  main {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .card {
    text-align: center;
    padding: 40px 48px;
    border-radius: 24px;
    background: #0b122480;
    border: 1px solid #1e293b;
    box-shadow: 0 24px 70px #00000066;
  }
  h1 { margin: 0 0 8px; font-size: 32px; }
  p { margin: 4px 0; color: #94a3b8; }
  .badge {
    display: inline-block;
    margin-top: 16px;
    padding: 6px 14px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 13px;
    background: #16a34a22;
    color: #4ade80;
    border: 1px solid #16a34a55;
  }
  code { color: #f0abfc; }
  footer {
    padding: 20px;
    text-align: center;
  }
  footer a {
    display: inline-flex;
    color: #64748b;
    transition: color 0.15s ease;
  }
  footer a:hover,
  footer a:focus-visible {
    color: #f8fafc;
  }
  footer svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
  }
</style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Hello, onchain world</h1>
      <p>This document is served entirely from a smart contract.</p>
      <p>Stored gzip + base64, inflated in your browser via <code>DecompressionStream</code>.</p>
      <div id="wallet" class="badge">Checking wallet…</div>
    </div>
  </main>
  <footer>
    <a href="https://github.com/TtheBC01/eip-8244" target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </footer>
  <script>
    // Proves inline scripts in the decompressed document still execute.
    const el = document.getElementById("wallet");
    el.textContent = window.ethereum
      ? "EIP-1193 wallet detected"
      : "No window.ethereum wallet found";
  </script>
</body>
</html>
